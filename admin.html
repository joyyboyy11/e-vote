<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#131f38">
  <title>E‑Vote — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="app container">
    <header class="topbar">
      <div class="brand">
        <svg class="logo" width="42" height="42" viewBox="0 0 42 42" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="seal2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#c79c46"/>
              <stop offset="1" stop-color="#8f6a24"/>
            </linearGradient>
          </defs>
          <circle cx="21" cy="21" r="19" fill="url(#seal2)"/>
          <circle cx="21" cy="21" r="19" fill="none" stroke="#131f38" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
          <path d="M13 22l6 6 10-13" fill="none" stroke="#131f38" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="brand-text">
          <h1 class="product">E‑Vote</h1>
          <p class="tagline">Administration</p>
        </div>
      </div>

      <nav class="topnav">
        <button id="signOutBtn" class="btn btn-ghost small" title="Se déconnecter">Déconnexion</button>
      </nav>
    </header>

    <section id="authSection" class="card auth-card">
      <h2 class="h2">Connexion administrateur</h2>
      <p class="hint">Accès réservé au personnel autorisé du registre électoral.</p>
      <form id="loginForm" class="form" novalidate>
        <div class="form-row">
          <label for="adminEmail">Email</label>
          <input id="adminEmail" type="email" required autocomplete="username" />
        </div>
        <div class="form-row">
          <label for="adminPassword">Mot de passe</label>
          <input id="adminPassword" type="password" required autocomplete="current-password" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Se connecter</button>
        </div>
        <p id="authMessage" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section id="dashboard" class="card hidden dashboard-card">
      <div class="row between">
        <h2 class="h2">Liste électeurs</h2>
        <div class="controls-inline">
          <input id="searchInput" class="input-search" placeholder="Rechercher par nom, prénom, email ou NID" />
        </div>
      </div>

      <div id="votersList" class="table"></div>
    </section>
  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
