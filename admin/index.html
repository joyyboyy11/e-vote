<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0a0c10">
  <title>E‑Vote — Console admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="app container">
    <header class="topbar">
      <div class="brand">
        <svg class="logo" width="36" height="36" viewBox="0 0 36 36" aria-hidden="true" focusable="false">
          <rect x="1.5" y="1.5" width="33" height="33" rx="7" fill="#14171d" stroke="#262b34"/>
          <path d="M9 12h18M9 18h18M9 24h10" stroke="#35c4a1" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="brand-text">
          <h1 class="product">E-VOTE_ADMIN</h1>
          <p class="tagline">Console de contrôle</p>
        </div>
      </div>

      <nav class="topnav">
        <a class="link-ghost" href="../electeur/index.html">Formulaire électeur</a>
        <button id="signOutBtn" class="btn btn-ghost small" title="Se déconnecter">Déconnexion</button>
      </nav>
    </header>

    <section id="authSection" class="card auth-card">
      <h2 class="h2">Connexion_admin</h2>
      <p class="hint">Accès réservé au personnel autorisé du registre électoral.</p>
      <form id="loginForm" class="form" novalidate>
        <div class="form-row">
          <label for="adminEmail">Email</label>
          <input id="adminEmail" type="email" required autocomplete="username" />
        </div>
        <div class="form-row">
          <label for="adminPassword">Mot de passe</label>
          <input id="adminPassword" type="password" required autocomplete="current-password" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Se connecter</button>
        </div>
        <p id="authMessage" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section id="dashboard" class="card hidden dashboard-card">
      <div class="row between">
        <h2 class="h2">Liste_électeurs</h2>
        <div class="controls-inline">
          <input id="searchInput" class="input-search" placeholder="rechercher : nom, email, nid…" />
        </div>
      </div>

      <div id="votersList" class="table"></div>
    </section>
  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
